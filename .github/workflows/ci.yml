name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-and-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks, working-tree)
        run: |
          VER=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --no-git --source=. --config=.gitleaks.toml --redact --verbose

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python compile + ruff
        run: |
          pip install --quiet ruff
          python -m compileall -q colt_auth.py assess-bot cassandra-bot hermes-skills/shodan-assessment/scripts *.py
          ruff check . || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node --check deck builders
        run: |
          for f in hermes-skills/shodan-assessment/scripts/*.js; do echo "check $f"; node --check "$f"; done

      - name: Tests (pytest)
        run: |
          pip install --quiet pytest
          python -m pytest tests -q
