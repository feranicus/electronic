name: Build, scan & deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (a git SHA for rollback). Blank = build current commit."
        required: false
        default: ""

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  build-scan-push:
    if: ${{ github.event.inputs.tag == '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Trivy (CLI, no fragile action pins)
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      # ---- colttechbot: build (load) -> Trivy scan -> push (only if clean) ----
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: assess-bot/Dockerfile
          load: true
          tags: ${{ env.IMAGE_BASE }}/colttechbot:${{ steps.meta.outputs.tag }}
      - name: Scan colttechbot (report-only; flip --exit-code to 1 to gate)
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 "$IMAGE_BASE/colttechbot:${{ steps.meta.outputs.tag }}"
      - name: Push colttechbot
        run: |
          docker tag "$IMAGE_BASE/colttechbot:${{ steps.meta.outputs.tag }}" "$IMAGE_BASE/colttechbot:latest"
          docker push "$IMAGE_BASE/colttechbot:${{ steps.meta.outputs.tag }}"
          docker push "$IMAGE_BASE/colttechbot:latest"

      # ---- cassandra: build (load) -> Trivy scan -> push (only if clean) ----
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: cassandra-bot/Dockerfile
          load: true
          tags: ${{ env.IMAGE_BASE }}/cassandra:${{ steps.meta.outputs.tag }}
      - name: Scan cassandra (report-only; flip --exit-code to 1 to gate)
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 "$IMAGE_BASE/cassandra:${{ steps.meta.outputs.tag }}"
      - name: Push cassandra
        run: |
          docker tag "$IMAGE_BASE/cassandra:${{ steps.meta.outputs.tag }}" "$IMAGE_BASE/cassandra:latest"
          docker push "$IMAGE_BASE/cassandra:${{ steps.meta.outputs.tag }}"
          docker push "$IMAGE_BASE/cassandra:latest"

  deploy:
    needs: [build-scan-push]
    if: ${{ always() && (needs.build-scan-push.result == 'success' || github.event.inputs.tag != '') }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Connect to Tailscale (reach the firewalled droplet privately)
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          version: latest
      - name: Install SSH deploy key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.TAILNET_HOST || '100.78.224.75' }}" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Deploy scanned image
        env:
          DROPLET_HOST: ${{ vars.TAILNET_HOST || '100.78.224.75' }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          SSH_KEY: /home/runner/.ssh/deploy_key
          IMAGE_OWNER: ghcr.io/${{ github.repository }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_SHA::12}"
          python deploy.py --ghcr "$TAG" --image-owner "$IMAGE_OWNER" --yes
