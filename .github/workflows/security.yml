name: Security
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # weekly, catches new CVEs even without a push

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy (CLI, no fragile action pins)
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy - dependencies & secrets (filesystem, report-only)
        run: trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 .

      - name: Trivy - IaC misconfig (Dockerfiles, compose; report-only)
        run: trivy config --severity HIGH,CRITICAL --exit-code 0 .

      - name: Hadolint - Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: error

      - name: pip-audit - Python advisories
        run: pip install pip-audit && pip-audit -r requirements.txt || true
