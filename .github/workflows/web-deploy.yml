name: Deploy web (cybergod.ai)

# Build the colt-web image IN GitHub, push to GHCR, then ship it to the droplet.
# Nothing is built on the droplet. The cybergod.ai vhost comes from the committed
# snippet deploy/caddy/cybergod.caddy. VideoDead / Amnezia / joplin are never touched.

on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - "hermes-skills/**"
      - "colt_auth.py"
      - "docker-compose.web.yml"
      - "deploy/caddy/**"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: prod-web-deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/feranicus/colt-web

jobs:
  # ---------------------------------------------------------------- build + push
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push colt-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: webapp/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/feranicus/electronic
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------- deploy to droplet
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read      # so the droplet can pull ghcr.io/feranicus/colt-web with the workflow token
    steps:
      - uses: actions/checkout@v7

      - name: Install SSH key + prove we can reach the droplet
        env:
          H: ${{ vars.DROPLET_HOST || '64.225.108.200' }}
          U: ${{ secrets.DROPLET_USER || 'root' }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$H" >> ~/.ssh/known_hosts 2>/dev/null || true
          # Fail HERE with a legible message rather than three steps later. The old Tailscale hop
          # connected fine and then ssh died anonymously in "Ship compose".
          if ! ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null \
                   -o LogLevel=ERROR -o ConnectTimeout=15 -o BatchMode=yes \
                   -i ~/.ssh/deploy_key "$U@$H" 'echo reachable'; then
            echo "::error::cannot ssh to $U@$H. Check the DROPLET_SSH_KEY secret is in the"
            echo "::error::droplet's /root/.ssh/authorized_keys, and that port 22 is reachable."
            exit 1
          fi

      - name: Ship compose + Caddy snippet to the droplet
        env:
          H: ${{ vars.DROPLET_HOST || '64.225.108.200' }}
          U: ${{ secrets.DROPLET_USER || 'root' }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=15 -o BatchMode=yes -i ~/.ssh/deploy_key "$U@$H" 'mkdir -p /opt/colt-stack/deploy/caddy'
          scp -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=15 -o BatchMode=yes -i ~/.ssh/deploy_key docker-compose.web.yml       "$U@$H:/opt/colt-stack/docker-compose.web.yml"
          scp -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=15 -o BatchMode=yes -i ~/.ssh/deploy_key deploy/caddy/cybergod.caddy  "$U@$H:/opt/colt-stack/deploy/caddy/cybergod.caddy"

      - name: Pull image + (re)start colt-web + wire Caddy (idempotent)
        env:
          H: ${{ vars.DROPLET_HOST || '64.225.108.200' }}
          U: ${{ secrets.DROPLET_USER || 'root' }}
          TAG: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=15 -o BatchMode=yes -i ~/.ssh/deploy_key "$U@$H" "WEB_TAG='$TAG' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/colt-stack

          # 1) pull the CI-built image. If the GHCR package is private, log in; if public, this is a no-op.
          echo "$GHCR_TOKEN" | docker login ghcr.io -u feranicus --password-stdin >/dev/null 2>&1 || true
          export WEB_TAG
          docker compose -p colt-stack -f docker-compose.web.yml pull
          docker compose -p colt-stack -f docker-compose.web.yml up -d --force-recreate

          # 2) wire cybergod.ai into the shared videodead-caddy from the committed snippet (idempotent).
          CADDY_CT="$(docker ps --format '{{.Names}}' | grep -i caddy | head -1)"
          CF="$(docker inspect "$CADDY_CT" --format '{{range .Mounts}}{{if eq .Destination "/etc/caddy/Caddyfile"}}{{.Source}}{{end}}{{end}}')"
          if [ -n "$CF" ]; then
            cp "$CF" "$CF.bak.$(date +%s)" || true
            # remove the marked block AND any stray/legacy cybergod.ai site block (self-healing)
            sed -i '/# colt:cybergod BEGIN/,/# colt:cybergod END/d' "$CF"
            sed -i '/cybergod/,/^}/d' "$CF"
            cat deploy/caddy/cybergod.caddy >> "$CF"
            # normalize the cybergod site line (defeats any markdown/paste corruption)
            sed -i 's#^cybergod.ai,.*{$#cybergod.ai, www.cybergod.ai {#' "$CF"
            # validate before reload so a bad config can never 502 the site
            if docker exec "$CADDY_CT" caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile 2>/dev/null; then
              docker exec "$CADDY_CT" caddy reload --config /etc/caddy/Caddyfile --force 2>/dev/null \
                || docker exec "$CADDY_CT" caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile --force 2>/dev/null \
                || docker restart "$CADDY_CT"
            else
              echo "[caddy] validate FAILED — restoring backup"; cp "$(ls -t $CF.bak.* | head -1)" "$CF"; exit 1
            fi
            echo "[caddy] wired cybergod.ai -> colt-web:8000 in $CF (via $CADDY_CT)"
          else
            echo "[caddy] WARN: could not find the Caddyfile mount on $CADDY_CT"; exit 1
          fi

          # 3) verify locally on the droplet
          sleep 3
          code="$(curl -k -s -o /dev/null -w '%{http_code}' https://localhost/api/me -H 'Host: cybergod.ai' || true)"
          echo "[verify] https://cybergod.ai/api/me (from droplet) -> $code   (401 = up + auth working)"
          docker compose -p colt-stack -f docker-compose.web.yml ps
          REMOTE
