# cybergod.ai web app (colt-web). Image is BUILT IN CI and pushed to GHCR — never built
# on the droplet. Deployed by .github/workflows/web-deploy.yml into project 'colt-stack'.
# Joins the EXISTING videodead network so the shared videodead-caddy (which owns :443)
# can reach it as http://colt-web:8000. Does NOT touch VideoDead / Amnezia / joplin.
services:
  web:
    image: ghcr.io/feranicus/colt-web:${WEB_TAG:-latest}
    build: {context: ., dockerfile: webapp/Dockerfile}   # direct deploys build here; CI pulls the image
    container_name: colt-web
    env_file:
      - .env               # LOKI_URL / LOKI_NETWORK (written by the deploy)
      - assess-bot/.env    # shared runtime secrets: COLT_BOT_PASSWORD, GMAIL_SENDER, GMAIL_SA_B64, OPENAI_*
    environment:
      # LLM chain as CODE. compose `environment:` overrides `env_file:`, so this beats the stale
      # ENRICH_MODEL=deepseek-3.2 in assess-bot/.env without anyone SSHing in to edit it.
      # Order is MEASURED (compare_models.py --lang de, real 14.6k prompt):
      #   gemma-4-31B-it 40.7s German, 11/11 findings, ACCURATE precedents, no invented CVE  <- head
      #   deepseek-3.2   good prose but timed out on real runs + hallucinated a CVE          <- backup
      #   llama-4-maverick 44.6s, accurate but generic                                       <- backup
      - ENRICH_MODELS=gemma-4-31B-it,deepseek-3.2,llama-4-maverick
      - ENRICH_TIMEOUT=90
      - ENGINE=/opt/shodan-skill/scripts/run_assessment.py
      - ALLOWED_EMAIL_DOMAIN=colt.net
      - SERVICE=colt-web
      - EVENTS_LOG=/var/log/colt/events.log   # -> the shared volume promtail ships to Loki/Grafana
      - SESSION_COOKIE_SECURE=1                # cookies over HTTPS only
    volumes:
      - colt_webdata:/data
      - colt_events:/var/log/colt             # same volume the bots + promtail use
    ports:
      - "127.0.0.1:8090:8000"     # local health only; public traffic comes via videodead-caddy
    networks: [videodead_appnet]
    restart: unless-stopped

volumes:
  colt_webdata: {}
  colt_events: {}          # project-scoped -> reuses the existing colt-stack_colt_events

networks:
  videodead_appnet:
    external: true               # the network videodead-caddy is already on
