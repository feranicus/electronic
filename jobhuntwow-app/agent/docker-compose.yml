# jhw-agent secure-browser sandbox. `python jhw.py up` builds+starts it; Chrome runs inside an
# Xvfb display you can watch at http://localhost:9090/vnc.html . Agents are triggered on demand
# by `python jhw.py scrape|tailor|apply` (docker exec), using the container's Chrome (CDP 9222)
# and the DO models via the droplet /v1 proxy.
services:
  jhw-agent:
    build: .
    container_name: jhw-agent
    env_file: .env
    ports:
      - "9090:9090"   # noVNC web UI — watch/intervene in the browser
      - "5900:5900"   # raw VNC (optional)
      - "9222:9222"   # Chrome CDP (health / local drive)
    environment:
      - DISPLAY=:0
    shm_size: 2gb
    volumes:
      - ./linkedin_cookies.json:/agent/linkedin_cookies.json:ro
      - ./out:/agent/out
      - ./agent.py:/agent/agent.py:ro          # edit agent code without rebuilding
      - ./tailor.py:/agent/tailor.py:ro         # resume/cover-letter pipeline
      - ./ask.py:/agent/ask.py:ro               # human-in-the-loop (Telegram) channel
      - ./flows:/agent/flows:ro                 # deterministic Playwright flows (LinkedIn, ATS)
      - ../Profile.pdf:/agent/Profile.pdf:ro    # candidate's LinkedIn Save-to-PDF (repo root)
      - ./templates:/agent/templates:ro         # resume_data.json + resume.html + cover_letter.html
      - jhw_chrome_data:/home/chrome-user/chrome-data  # PERSIST LinkedIn login across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9090/ >/dev/null && curl -fsS http://localhost:9222/json/version >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 40s

volumes:
  jhw_chrome_data:
