# Promtail: tail the assess-bot event log file -> Loki.
# (docker_sd doesn't work on Docker Desktop — API version mismatch — so we tail a file.)
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn
positions:
  filename: /tmp/promtail/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: assessbot
    static_configs:
      - targets: [localhost]
        labels:
          container: assess-bot
          job: assessbot
          __path__: /logs/events.log
    pipeline_stages:
      - json:
          expressions:
            evt: evt
            bot: bot
            company: company
            status: status
      - labels:
          evt:
          bot:
