# Ships the Colt bots' events.log into the EXISTING Loki (jobhuntwow/videodead stack).
# LOKI_URL is injected at runtime (promtail started with -config.expand-env=true).
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn
positions:
  filename: /tmp/promtail/positions.yaml
clients:
  - url: ${LOKI_URL}
scrape_configs:
  - job_name: coltbots
    static_configs:
      - targets: [localhost]
        labels:
          container: assess-bot     # our dashboard filters on this; keeps us separate from jobhuntwow
          job: coltbots
          __path__: /logs/events.log
    pipeline_stages:
      - json:
          expressions:
            evt: evt
            bot: bot
            company: company
            status: status
      - labels:
          evt:
          bot:
